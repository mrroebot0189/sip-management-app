# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - SIPManagementAPP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC login to Azure
      contents: read   # Required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: |
          npm install --prefix backend
          npm install --prefix frontend

      - name: Build backend and frontend
        run: |
          npm run build --prefix backend
          npm run build --prefix frontend

      - name: Copy frontend build into backend public folder
        run: cp -r frontend/dist backend/dist/public

      - name: Create standalone deployment package
        run: |
          mkdir -p deploy
          cp -r backend/dist deploy/dist
          cp -r backend/node_modules deploy/node_modules
          cp backend/package.json deploy/package.json
          cd deploy && zip -r ../deploy.zip .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_3F72F8F38CC94FF7AD89EC7BF5BDF664 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_89960AAC5209422789774BECDF124993 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_FE3E7765594040BB9D518E3747C5E68D }}

      - name: Disable remote build and configure App Service
        run: |
          RG=$(az webapp list --query "[?name=='SIPManagementAPP'].resourceGroup | [0]" -o tsv)
          az webapp config appsettings set \
            --name SIPManagementAPP \
            --resource-group "$RG" \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false NODE_ENV=production

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'SIPManagementAPP'
          slot-name: 'Production'
          package: deploy.zip
          startup-command: 'node dist/index.js'
